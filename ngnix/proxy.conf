server {
  listen 80;
  server_name diagnova.duckdns.org api.diagnova.duckdns.org ai.diagnova.duckdns.org;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name diagnova.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/diagnova.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/diagnova.duckdns.org/privkey.pem;

  location / {
    proxy_pass http://web:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name api.diagnova.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/diagnova.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/diagnova.duckdns.org/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name ai.diagnova.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/diagnova.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/diagnova.duckdns.org/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://ai:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}