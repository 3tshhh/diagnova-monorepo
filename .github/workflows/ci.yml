name: CI

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm --recursive run test --if-present

      - name: Build
        run: pnpm build

      - name: Notify Discord - Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_CI_URL }}
          title: "CI Passed"
          description: "`${{ github.repository }}` passed checks on `${{ github.ref_name }}`"
          color: 0x00ff00

      - name: Notify Discord - Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_CI_URL }}
          title: "CI Failed"
          description: "`${{ github.repository }}` failed checks on `${{ github.ref_name }}`"
          color: 0xff0000

  auto-merge-dev-to-master:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or reuse pull request from dev to master
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          pr_number="$(gh pr list --base master --head dev --state open --json number --jq '.[0].number')"
          if [ -z "$pr_number" ]; then
            pr_url="$(gh pr create --base master --head dev --title "Auto merge dev into master" --body "This PR was created automatically after CI passed on dev.")"
            pr_number="$(echo "$pr_url" | sed 's#.*/##')"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Merge pull request
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --squash --admin

      - name: Notify Discord - Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
            webhook: ${{ secrets.DISCORD_CI_URL }}
            title: "CI Passed"
            description: "PR `${{ github.head_ref }}` passed all checks"
            color: 0x00ff00

      - name: Notify Discord - Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
            webhook: ${{ secrets.DISCORD_CI_URL }}
            title: "CI Failed"
            description: "PR `${{ github.head_ref }}` failed checks"
            color: 0xff0000
